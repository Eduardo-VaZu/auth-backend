services:
  app:
    profiles:
      - fullstack
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth_backend
      REDIS_URL: redis://redis:6379
    ports:
      - '${PORT:-4000}:${PORT:-4000}'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD-SHELL', 'curl -f http://localhost:${PORT:-4000}/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - auth-backend-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d auth_backend']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - auth-backend-network

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - auth-backend-network

  sonarqube-db:
    profiles:
      - observability
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sonar -d sonarqube']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - auth-backend-network

  sonarqube:
    profiles:
      - observability
    image: sonarqube:community
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - '9000:9000'
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - auth-backend-network

volumes:
  postgres_data:
  redis_data:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  auth-backend-network:
    driver: bridge
