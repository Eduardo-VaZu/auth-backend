openapi: 3.0.3
info:
  title: Auth Backend API
  version: 1.0.0
  description: API de autenticacion local con sesiones, refresh rotation y auditoria.
  license:
    name: UNLICENSED
    url: https://choosealicense.com/no-permission/
x-changelog:
  - date: 2026-05-01
    summary: Alineacion de contrato con backend actual
    changes:
      - Registro actualizado a verificacion obligatoria de email sin login automatico.
      - Logout documentado como idempotente y sin seguridad obligatoria en ruta.
      - Resend verification actualizado para recibir email sin autenticacion.
      - Respuestas preview documentadas para development/test.
      - Codigos 422 agregados en endpoints con validacion de body.
servers:
  - url: /
tags:
  - name: Health
    description: Endpoints de salud y disponibilidad de dependencias.
  - name: Auth
    description: Endpoints de autenticacion, sesiones y credenciales.
  - name: Admin
    description: Endpoints administrativos y de auditoria.
security:
  - accessTokenCookie: []
components:
  securitySchemes:
    accessTokenCookie:
      type: apiKey
      in: cookie
      name: access_token
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refresh_token
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            requestId:
              type: string
              format: uuid
          required:
            - code
            - message
            - requestId
      required:
        - error
      example:
        error:
          code: VALIDATION_ERROR
          message: Validation failed
          requestId: 8f7c8ff0-5b2c-47a7-bbd1-b2b7235a6b39
    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
        roles:
          type: array
          items:
            type: string
      required:
        - id
        - email
        - role
        - roles
      example:
        id: 9d0e8a69-5d42-46cf-9011-3642c3bfe6ef
        email: user@example.com
        role: user
        roles:
          - user
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required:
        - email
        - password
      example:
        email: user@example.com
        password: supersecure123
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required:
        - email
        - password
      example:
        email: user@example.com
        password: supersecure123
    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
          minLength: 8
        newPassword:
          type: string
          minLength: 8
      required:
        - currentPassword
        - newPassword
      example:
        currentPassword: current-pass-123
        newPassword: new-pass-456
    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email
      example:
        email: user@example.com
    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
          description: Formato tokenId.secret
        newPassword:
          type: string
          minLength: 8
      required:
        - token
        - newPassword
      example:
        token: 6c8bd2f8-7f9a-4ef7-9cd9-7d8d12c03baf.4b2e4c76d081ef6f0cd4427547ea2c48c0fd32c9e15bb74c6471fc566fd0b8ce
        newPassword: new-pass-456
    VerifyEmailRequest:
      type: object
      properties:
        token:
          type: string
          description: Formato tokenId.secret
      required:
        - token
      example:
        token: 6c8bd2f8-7f9a-4ef7-9cd9-7d8d12c03baf.4b2e4c76d081ef6f0cd4427547ea2c48c0fd32c9e15bb74c6471fc566fd0b8ce
    ResendVerificationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email
      example:
        email: user@example.com
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
      example:
        message: Operation completed successfully
    PreviewMessageResponse:
      type: object
      properties:
        message:
          type: string
        previewToken:
          type: string
          description: Solo disponible en development/test con EMAIL_DELIVERY_MODE=preview.
      required:
        - message
      example:
        message: Verification instructions generated
        previewToken: 6c8bd2f8-7f9a-4ef7-9cd9-7d8d12c03baf.4b2e4c76d081ef6f0cd4427547ea2c48c0fd32c9e15bb74c6471fc566fd0b8ce
    AuthUserResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
      required:
        - user
      example:
        user:
          id: 9d0e8a69-5d42-46cf-9011-3642c3bfe6ef
          email: user@example.com
          role: user
          roles:
            - user
    RegisterResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
        verificationRequired:
          type: boolean
          description: Siempre true en el flujo actual de registro.
        message:
          type: string
        previewToken:
          type: string
          description: Solo disponible en development/test con EMAIL_DELIVERY_MODE=preview.
      required:
        - user
        - verificationRequired
        - message
      example:
        user:
          id: 9d0e8a69-5d42-46cf-9011-3642c3bfe6ef
          email: user@example.com
          role: user
          roles:
            - user
        verificationRequired: true
        message: Verify your email before signing in
        previewToken: 6c8bd2f8-7f9a-4ef7-9cd9-7d8d12c03baf.4b2e4c76d081ef6f0cd4427547ea2c48c0fd32c9e15bb74c6471fc566fd0b8ce
    SessionItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        deviceName:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        ipAddress:
          type: string
          nullable: true
        lastActivityAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        isCurrent:
          type: boolean
      required:
        - id
        - lastActivityAt
        - expiresAt
        - createdAt
        - isCurrent
    SessionsResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionItem'
      required:
        - sessions
    RoleItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        isSystem:
          type: boolean
      required:
        - id
        - code
        - name
        - isSystem
    RolesResponse:
      type: object
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/RoleItem'
      required:
        - roles
    UserRolesResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        roles:
          type: array
          items:
            $ref: '#/components/schemas/RoleItem'
      required:
        - userId
        - roles
    AssignUserRoleRequest:
      type: object
      properties:
        roleId:
          type: string
          format: uuid
      required:
        - roleId
    ChangeEmailRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email
    Pagination:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 1
      required:
        - page
        - limit
        - total
        - totalPages
    AdminUserItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
        roles:
          type: array
          items:
            type: string
        status:
          type: string
          enum:
            - active
            - disabled
            - locked
            - pending_verification
        authzVersion:
          type: integer
        emailVerifiedAt:
          type: string
          format: date-time
          nullable: true
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - email
        - role
        - roles
        - status
        - authzVersion
        - emailVerifiedAt
        - lastLoginAt
        - createdAt
        - updatedAt
        - deletedAt
    AdminUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/AdminUserItem'
        pagination:
          $ref: '#/components/schemas/Pagination'
      required:
        - users
        - pagination
    AdminUserResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/AdminUserItem'
      required:
        - user
    UpdateUserStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum:
            - active
            - disabled
            - locked
      required:
        - status
    AuditLogItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
          nullable: true
        actorUserId:
          type: string
          format: uuid
          nullable: true
        sessionId:
          type: string
          format: uuid
          nullable: true
        roleId:
          type: string
          format: uuid
          nullable: true
        eventType:
          type: string
        eventStatus:
          type: string
          enum:
            - success
            - failure
            - blocked
            - incident
        ipAddress:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        requestId:
          type: string
          format: uuid
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - actorUserId
        - sessionId
        - roleId
        - eventType
        - eventStatus
        - ipAddress
        - userAgent
        - requestId
        - metadata
        - createdAt
    AuditLogsResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogItem'
        pagination:
          $ref: '#/components/schemas/Pagination'
      required:
        - logs
        - pagination
paths:
  /health:
    get:
      operationId: getHealthStatus
      tags:
        - Health
      summary: Health check de servicio
      security: []
      responses:
        '200':
          description: Dependencias operativas
        '503':
          description: Alguna dependencia degradada
  /auth/register:
    post:
      operationId: registerUser
      tags:
        - Auth
      summary: Registro de usuario con verificacion obligatoria de email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuario registrado sin inicio de sesion automatico
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
              examples:
                previewMode:
                  summary: Registro exitoso en development/test
                  value:
                    user:
                      id: 9d0e8a69-5d42-46cf-9011-3642c3bfe6ef
                      email: user@example.com
                      role: user
                      roles:
                        - user
                    verificationRequired: true
                    message: Verify your email before signing in
                    previewToken: 6c8bd2f8-7f9a-4ef7-9cd9-7d8d12c03baf.4b2e4c76d081ef6f0cd4427547ea2c48c0fd32c9e15bb74c6471fc566fd0b8ce
                productionMode:
                  summary: Registro exitoso en produccion
                  value:
                    user:
                      id: 9d0e8a69-5d42-46cf-9011-3642c3bfe6ef
                      email: user@example.com
                      role: user
                      roles:
                        - user
                    verificationRequired: true
                    message: Verify your email before signing in
        '422':
          description: Datos invalidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflicto (email ya existe)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      operationId: loginUser
      tags:
        - Auth
      summary: Login local
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso (setea cookies access_token y refresh_token)
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '401':
          description: Credenciales invalidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Body invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Throttling de login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      operationId: refreshSession
      tags:
        - Auth
      summary: Rotacion de refresh token
      security:
        - refreshTokenCookie: []
      responses:
        '200':
          description: Sesion refrescada
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Refresh token faltante o invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      operationId: logoutSession
      tags:
        - Auth
      summary: Logout idempotente de sesion actual
      security: []
      responses:
        '200':
          description: Logout exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Logged out successfully
  /auth/logout-all:
    post:
      operationId: logoutAllSessions
      tags:
        - Auth
      summary: Logout de todas las sesiones del usuario
      security:
        - accessTokenCookie: []
      responses:
        '200':
          description: Logout global exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/change-password:
    post:
      operationId: changePassword
      tags:
        - Auth
      summary: Cambiar password y revocar sesiones activas
      security:
        - accessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password cambiado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: No autenticado o credenciales invalidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Body invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags:
        - Auth
      summary: Genera instrucciones de recuperacion de password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Respuesta idempotente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewMessageResponse'
              examples:
                previewMode:
                  summary: Development/test con preview token
                  value:
                    message: If the account exists, password reset instructions were generated
                    previewToken: 6c8bd2f8-7f9a-4ef7-9cd9-7d8d12c03baf.4b2e4c76d081ef6f0cd4427547ea2c48c0fd32c9e15bb74c6471fc566fd0b8ce
                productionMode:
                  summary: Produccion sin exponer token
                  value:
                    message: If the account exists, password reset instructions were generated
        '422':
          description: Body invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/reset-password:
    post:
      operationId: resetPassword
      tags:
        - Auth
      summary: Resetea password usando token de un solo uso
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reseteado y sesiones revocadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Token invalido o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Body invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags:
        - Auth
      summary: Verifica email con token de un solo uso
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verificado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Token invalido o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Body invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/resend-verification:
    post:
      operationId: resendVerification
      tags:
        - Auth
      summary: Regenera instrucciones de verificacion de email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
      responses:
        '200':
          description: Respuesta idempotente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewMessageResponse'
              examples:
                previewMode:
                  summary: Development/test con preview token
                  value:
                    message: Verification instructions generated
                    previewToken: 6c8bd2f8-7f9a-4ef7-9cd9-7d8d12c03baf.4b2e4c76d081ef6f0cd4427547ea2c48c0fd32c9e15bb74c6471fc566fd0b8ce
                productionMode:
                  summary: Produccion sin exponer token
                  value:
                    message: Verification instructions generated
        '422':
          description: Body invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/me:
    get:
      operationId: getCurrentUser
      tags:
        - Auth
      summary: Usuario autenticado actual
      security:
        - accessTokenCookie: []
      responses:
        '200':
          description: Usuario autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/me/email:
    patch:
      operationId: changeEmail
      tags:
        - Auth
      summary: Cambia email y requiere re-verificacion
      security:
        - accessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeEmailRequest'
      responses:
        '200':
          description: Email actualizado y sesiones revocadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewMessageResponse'
              examples:
                previewMode:
                  summary: Development/test con preview token
                  value:
                    message: Email updated. Re-verify your new email to reactivate access
                    previewToken: 6c8bd2f8-7f9a-4ef7-9cd9-7d8d12c03baf.4b2e4c76d081ef6f0cd4427547ea2c48c0fd32c9e15bb74c6471fc566fd0b8ce
                productionMode:
                  summary: Produccion sin exponer token
                  value:
                    message: Email updated. Re-verify your new email to reactivate access
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email en uso o email igual al actual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Body invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/sessions:
    get:
      operationId: listSessions
      tags:
        - Auth
      summary: Lista sesiones activas del usuario autenticado
      security:
        - accessTokenCookie: []
      responses:
        '200':
          description: Lista de sesiones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionsResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/sessions/{sessionId}:
    delete:
      operationId: revokeSession
      tags:
        - Auth
      summary: Revoca una sesion especifica del usuario autenticado
      security:
        - accessTokenCookie: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Sesion revocada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Sesion no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/roles:
    get:
      operationId: listRoles
      tags:
        - Admin
      summary: Lista roles disponibles
      security:
        - accessTokenCookie: []
      responses:
        '200':
          description: Lista de roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RolesResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Requiere rol admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users:
    get:
      operationId: listUsers
      tags:
        - Admin
      summary: Lista paginada de usuarios
      security:
        - accessTokenCookie: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
