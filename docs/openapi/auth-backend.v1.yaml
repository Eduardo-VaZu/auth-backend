openapi: 3.0.3
info:
  title: Auth Backend API
  version: 1.0.0
  description: API de autenticacion local con sesiones, refresh rotation y auditoria.
servers:
  - url: http://localhost:4000
tags:
  - name: Health
  - name: Auth
  - name: Admin
components:
  securitySchemes:
    accessTokenCookie:
      type: apiKey
      in: cookie
      name: access_token
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refresh_token
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            requestId:
              type: string
              format: uuid
          required:
            - code
            - message
            - requestId
      required:
        - error
    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
        roles:
          type: array
          items:
            type: string
      required:
        - id
        - email
        - role
        - roles
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required:
        - email
        - password
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required:
        - email
        - password
    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
          minLength: 8
        newPassword:
          type: string
          minLength: 8
      required:
        - currentPassword
        - newPassword
    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email
    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
          description: Formato tokenId.secret
        newPassword:
          type: string
          minLength: 8
      required:
        - token
        - newPassword
    VerifyEmailRequest:
      type: object
      properties:
        token:
          type: string
          description: Formato tokenId.secret
      required:
        - token
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    AuthUserResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
      required:
        - user
    SessionItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        deviceName:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        ipAddress:
          type: string
          nullable: true
        lastActivityAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        isCurrent:
          type: boolean
      required:
        - id
        - lastActivityAt
        - expiresAt
        - createdAt
        - isCurrent
    SessionsResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionItem'
      required:
        - sessions
    RoleItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        isSystem:
          type: boolean
      required:
        - id
        - code
        - name
        - isSystem
    RolesResponse:
      type: object
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/RoleItem'
      required:
        - roles
    UserRolesResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        roles:
          type: array
          items:
            $ref: '#/components/schemas/RoleItem'
      required:
        - userId
        - roles
    AssignUserRoleRequest:
      type: object
      properties:
        roleId:
          type: string
          format: uuid
      required:
        - roleId
    ChangeEmailRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email
    Pagination:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 1
      required:
        - page
        - limit
        - total
        - totalPages
    AdminUserItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
        roles:
          type: array
          items:
            type: string
        status:
          type: string
          enum:
            - active
            - disabled
            - locked
            - pending_verification
        authzVersion:
          type: integer
        emailVerifiedAt:
          type: string
          format: date-time
          nullable: true
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - email
        - role
        - roles
        - status
        - authzVersion
        - emailVerifiedAt
        - lastLoginAt
        - createdAt
        - updatedAt
        - deletedAt
    AdminUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/AdminUserItem'
        pagination:
          $ref: '#/components/schemas/Pagination'
      required:
        - users
        - pagination
    AdminUserResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/AdminUserItem'
      required:
        - user
    UpdateUserStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum:
            - active
            - disabled
            - locked
      required:
        - status
    AuditLogItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
          nullable: true
        actorUserId:
          type: string
          format: uuid
          nullable: true
        sessionId:
          type: string
          format: uuid
          nullable: true
        roleId:
          type: string
          format: uuid
          nullable: true
        eventType:
          type: string
        eventStatus:
          type: string
          enum:
            - success
            - failure
            - blocked
            - incident
        ipAddress:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        requestId:
          type: string
          format: uuid
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - actorUserId
        - sessionId
        - roleId
        - eventType
        - eventStatus
        - ipAddress
        - userAgent
        - requestId
        - metadata
        - createdAt
    AuditLogsResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogItem'
        pagination:
          $ref: '#/components/schemas/Pagination'
      required:
        - logs
        - pagination
paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check de servicio
      responses:
        '200':
          description: Dependencias operativas
        '503':
          description: Alguna dependencia degradada
  /auth/register:
    post:
      tags:
        - Auth
      summary: Registro de usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuario registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '400':
          description: Datos invalidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflicto (email ya existe)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login local
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso (setea cookies access_token y refresh_token)
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '401':
          description: Credenciales invalidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Throttling de login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Rotacion de refresh token
      security:
        - refreshTokenCookie: []
      responses:
        '200':
          description: Sesion refrescada
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Refresh token faltante o invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout de sesion actual
      security:
        - accessTokenCookie: []
      responses:
        '200':
          description: Logout exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout-all:
    post:
      tags:
        - Auth
      summary: Logout de todas las sesiones del usuario
      security:
        - accessTokenCookie: []
      responses:
        '200':
          description: Logout global exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/change-password:
    post:
      tags:
        - Auth
      summary: Cambiar password y revocar sesiones activas
      security:
        - accessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password cambiado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: No autenticado o credenciales invalidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Genera instrucciones de recuperacion de password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Respuesta idempotente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '422':
          description: Body invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/reset-password:
    post:
      tags:
        - Auth
      summary: Resetea password usando token de un solo uso
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reseteado y sesiones revocadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Token invalido o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Body invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/verify-email:
    post:
      tags:
        - Auth
      summary: Verifica email con token de un solo uso
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verificado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Token invalido o expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Body invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/resend-verification:
    post:
      tags:
        - Auth
      summary: Regenera instrucciones de verificacion de email
      security:
        - accessTokenCookie: []
      responses:
        '200':
          description: Respuesta idempotente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/me:
    get:
      tags:
        - Auth
      summary: Usuario autenticado actual
      security:
        - accessTokenCookie: []
      responses:
        '200':
          description: Usuario autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/me/email:
    patch:
      tags:
        - Auth
      summary: Cambia email y requiere re-verificacion
      security:
        - accessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeEmailRequest'
      responses:
        '200':
          description: Email actualizado y sesiones revocadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email en uso o email igual al actual
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Body invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/sessions:
    get:
      tags:
        - Auth
      summary: Lista sesiones activas del usuario autenticado
      security:
        - accessTokenCookie: []
      responses:
        '200':
          description: Lista de sesiones
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionsResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/sessions/{sessionId}:
    delete:
      tags:
        - Auth
      summary: Revoca una sesion especifica del usuario autenticado
      security:
        - accessTokenCookie: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Sesion revocada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Sesion no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/roles:
    get:
      tags:
        - Admin
      summary: Lista roles disponibles
      security:
        - accessTokenCookie: []
      responses:
        '200':
          description: Lista de roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RolesResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Requiere rol admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users:
    get:
      tags:
        - Admin
      summary: Lista paginada de usuarios
      security:
        - accessTokenCookie: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - active
              - disabled
              - locked
              - pending_verification
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUsersResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Requiere rol admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Query invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users/{userId}:
    get:
      tags:
        - Admin
      summary: Perfil completo de un usuario
      security:
        - accessTokenCookie: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Perfil del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Requiere rol admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Parametros invalidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Admin
      summary: Soft delete de un usuario
      security:
        - accessTokenCookie: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Usuario eliminado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Requiere rol admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Parametros invalidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users/{userId}/status:
    patch:
      tags:
        - Admin
      summary: Actualiza estado de un usuario
      security:
        - accessTokenCookie: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserStatusRequest'
      responses:
        '200':
          description: Estado actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Requiere rol admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Usuario eliminado no puede cambiar estado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Body o parametros invalidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/audit-logs:
    get:
      tags:
        - Admin
      summary: Consulta paginada de logs de auditoria
      security:
        - accessTokenCookie: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: userId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: actorUserId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: requestId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: eventType
          in: query
          required: false
          schema:
            type: string
        - name: eventStatus
          in: query
          required: false
          schema:
            type: string
            enum:
              - success
              - failure
              - blocked
              - incident
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Logs de auditoria
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogsResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Requiere rol admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Query invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/users/{userId}/roles:
    get:
      tags:
        - Admin
      summary: Lista roles activos de un usuario
      security:
        - accessTokenCookie: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Roles activos del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRolesResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
