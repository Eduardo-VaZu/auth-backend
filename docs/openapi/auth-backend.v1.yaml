openapi: 3.0.3
info:
  title: Auth Backend API
  version: 1.0.0
  description: API de autenticacion local con sesiones, refresh rotation y auditoria.
servers:
  - url: http://localhost:4000
tags:
  - name: Health
  - name: Auth
components:
  securitySchemes:
    accessTokenCookie:
      type: apiKey
      in: cookie
      name: access_token
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refresh_token
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            requestId:
              type: string
              format: uuid
          required:
            - code
            - message
            - requestId
      required:
        - error
    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
        roles:
          type: array
          items:
            type: string
      required:
        - id
        - email
        - role
        - roles
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required:
        - email
        - password
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required:
        - email
        - password
    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
          minLength: 8
        newPassword:
          type: string
          minLength: 8
      required:
        - currentPassword
        - newPassword
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    AuthUserResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
      required:
        - user
paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check de servicio
      responses:
        '200':
          description: Dependencias operativas
        '503':
          description: Alguna dependencia degradada
  /auth/register:
    post:
      tags:
        - Auth
      summary: Registro de usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuario registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '400':
          description: Datos invalidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflicto (email ya existe)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login local
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso (setea cookies access_token y refresh_token)
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '401':
          description: Credenciales invalidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Throttling de login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Rotacion de refresh token
      security:
        - refreshTokenCookie: []
      responses:
        '200':
          description: Sesion refrescada
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Refresh token faltante o invalido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout de sesion actual
      security:
        - accessTokenCookie: []
      responses:
        '200':
          description: Logout exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout-all:
    post:
      tags:
        - Auth
      summary: Logout de todas las sesiones del usuario
      security:
        - accessTokenCookie: []
      responses:
        '200':
          description: Logout global exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/change-password:
    post:
      tags:
        - Auth
      summary: Cambiar password y revocar sesiones activas
      security:
        - accessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password cambiado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: No autenticado o credenciales invalidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/me:
    get:
      tags:
        - Auth
      summary: Usuario autenticado actual
      security:
        - accessTokenCookie: []
      responses:
        '200':
          description: Usuario autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
