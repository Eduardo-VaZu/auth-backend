# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: auth_backend
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d auth_backend"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PORT: 4000
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:3000
      TRUST_PROXY: false
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/auth_backend
      DB_POOL_MAX: 10
      DB_POOL_IDLE_TIMEOUT: 10000
      DB_POOL_CONNECTION_TIMEOUT: 5000
      REDIS_URL: redis://localhost:6379
      ACCESS_TOKEN_SECRET: test-access-secret-12345678901234567890
      REFRESH_TOKEN_SECRET: test-refresh-secret-123456789012345678
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      COOKIE_SECRET: test-cookie-secret-123456789012345678901
      COOKIE_DOMAIN: localhost
      COOKIE_SECURE: false
      COOKIE_SAME_SITE: lax
      MAX_SESSIONS_PER_USER: 5
      SHUTDOWN_TIMEOUT_MS: 10000

    strategy:
      matrix:
        node-version: [22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run db:migrate
    - run: npm run db:seed:roles
    - run: npm run type:check
    - run: npm run lint
    - run: npm run build --if-present
    - run: npm run test:ci
