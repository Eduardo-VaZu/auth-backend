name: Node.js CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  static-analysis:
    name: Type check & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run type:check
      - run: npm run lint
      - run: npm run format:check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: static-analysis
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run test:unit
      - name: Unit coverage report (non-blocking while thresholds are ramping)
        if: always()
        continue-on-error: true
        run: npm run test:unit -- --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: coverage/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: static-analysis
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: auth_backend
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d auth_backend"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/auth_backend
      REDIS_URL: redis://localhost:6379
      ACCESS_TOKEN_SECRET: test-access-secret-12345678901234567890
      REFRESH_TOKEN_SECRET: test-refresh-secret-123456789012345678
      ACCESS_TOKEN_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      COOKIE_SECRET: test-cookie-secret-123456789012345678901
      COOKIE_DOMAIN: localhost
      COOKIE_SECURE: 'false'
      COOKIE_SAME_SITE: lax
      TRUST_PROXY: 'false'
      CORS_ORIGIN: http://localhost:3000
      DB_POOL_MAX: '10'
      DB_POOL_IDLE_TIMEOUT: '10000'
      DB_POOL_CONNECTION_TIMEOUT: '5000'
      MAX_SESSIONS_PER_USER: '5'
      SHUTDOWN_TIMEOUT_MS: '10000'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run db:seed:roles
      - run: npm run build
      - run: npm run test:integration

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run build

  postman-sync:
    name: Postman Sync Check
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    env:
      POSTMAN_SPEC_ID: 1210b2ab-b12d-4a19-b1d5-cbf28da6eec2
      POSTMAN_COLLECTION_UID: 42700275-5823a8cb-3329-4126-9fdc-6fb5e57cfd90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run postman:sync:check
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
